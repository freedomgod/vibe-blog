codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
    patch:
      default:
        target: auto
        threshold: 1%

  # Frontend coverage
  frontend:
    target: 60%
    threshold: 1%
    paths:
      - "vibe-blog/frontend/src/**"

  # Backend coverage
  backend:
    target: 55%
    threshold: 1%
    paths:
      - "vibe-blog/backend/services/**"
      - "vibe-blog/backend/utils/**"
      - "vibe-blog/backend/app.py"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

ignore:
  - "vibe-blog/frontend/node_modules"
  - "vibe-blog/frontend/dist"
  - "vibe-blog/frontend/__tests__"
  - "vibe-blog/frontend/**/*.config.*"
  - "vibe-blog/backend/**/__pycache__"

flags:
  frontend:
    paths:
      - vibe-blog/frontend/src
    carryforward: true

  backend:
    paths:
      - vibe-blog/backend/services
      - vibe-blog/backend/utils
      - vibe-blog/backend/app.py
    carryforward: true
